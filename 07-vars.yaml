- name: print username and passwords
  hosts: localhost
  connection: local
  vars_prompt:
    - name: "username"
      prompt: "Enter username"
      private: no
    - name: "password"
      prompt: "Enter password"
      private: yes

  tasks:
    - name: "print the username and password"
      ansible.builtin.debug:
        msg: "The username is {{ username }} and the password is {{ password }}."